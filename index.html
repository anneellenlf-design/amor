<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
    color:#e91e63;
}

p{
    font-size:20px;
    line-height:1.6;
    color:#444;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#e91e63;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.coracao{
    position:fixed;
    color:red;
    animation:subir 6s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

<h1>❤️ Para Você ❤️</h1>

<p id="texto">
Tenho muita sorte por ter você na minha vida.
Você me faz sorrir, me dá força e torna meus dias melhores.
</p>

<button onclick="mostrar()">
Clique aqui ❤️
</button>

</div>

<script>

function mostrar(){

document.getElementById("texto").innerHTML =
`Eu só queria que você soubesse uma coisa...

Eu amo você de todo o meu coração. ❤️

Obrigado por estar ao meu lado, por cuidar de mim, por dividir tantos momentos comigo.

Espero que possamos viver muitos sonhos juntos.

Eu te amo hoje, amanhã e sempre. 🥰❤️`;

}

function criarCoracao(){

const c=document.createElement("div");

c.className="coracao";

c.innerHTML="❤️";

c.style.left=Math.random()*100+"vw";

c.style.fontSize=(20+Math.random()*30)+"px";

c.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},7000);

}

setInterval(criarCoracao,300);

</script>

</body>
</html>
